<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun 🎉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        biru: {
                            muda: '#E0F7FF',
                            lembut: '#87CEEB',
                            utama: '#1E90FF',
                            tua: '#0057B8',
                        }
                    },
                    fontFamily: {
                        cantik: ['Great Vibes', 'cursive'],
                        modern: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #ffffff 0%, #E0F7FF 50%, #D6EAF8 100%);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Awan Melayang */
        .awan {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 100px;
            box-shadow: 0 8px 32px rgba(30, 144, 255, 0.1);
            animation: melayang 20s linear infinite;
        }
        .awan:nth-child(1) { width: 180px; height: 60px; top: 10%; left: -200px; animation-duration: 25s; }
        .awan:nth-child(2) { width: 250px; height: 80px; top: 25%; left: -300px; animation-duration: 35s; animation-delay: 5s; }
        .awan:nth-child(3) { width: 150px; height: 50px; top: 45%; left: -150px; animation-duration: 20s; animation-delay: 10s; }

        @keyframes melayang {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 400px)); }
        }

        /* Balon */
        .balon {
            position: absolute;
            font-size: 3rem;
            animation: terbang 6s ease-in-out infinite alternate;
            filter: drop-shadow(0 4px 8px rgba(0, 87, 184, 0.2));
        }
        .balon:nth-child(1) { left: 8%; animation-delay: 0s; }
        .balon:nth-child(2) { left: 22%; animation-delay: 0.8s; font-size: 3.5rem; }
        .balon:nth-child(3) { right: 20%; animation-delay: 1.6s; font-size: 2.8rem; }
        .balon:nth-child(4) { right: 7%; animation-delay: 2.4s; font-size: 3.2rem; }

        @keyframes terbang {
            0% { transform: translateY(10px) rotate(-5deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Bintang Kedip */
        .bintang {
            position: absolute;
            color: #1E90FF;
            animation: kedip 2s ease-in-out infinite;
        }
        @keyframes kedip {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Kartu Ucapan */
        .kartu {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(30, 144, 255, 0.15);
            box-shadow: 0 15px 50px rgba(30, 144, 255, 0.18);
            position: relative;
            overflow: hidden;
            border-radius: 3rem;
        }
        .kartu::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(30, 144, 255, 0.05), transparent);
            transform: rotate(45deg);
            animation: pantul 8s linear infinite;
        }
        @keyframes pantul {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Tombol */
        .btn-kejutan {
            background: linear-gradient(135deg, #1E90FF 0%, #0057B8 100%);
            box-shadow: 0 8px 25px rgba(30, 144, 255, 0.35);
            transition: all 0.3s ease;
        }
        .btn-kejutan:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(30, 144, 255, 0.45);
        }

        /* Konfeti */
        .konfeti {
            position: absolute;
            width: 12px;
            height: 12px;
            opacity: 0;
            animation: jatuh 3s ease-out forwards;
        }
        @keyframes jatuh {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(250px) rotate(720deg); opacity: 0; }
        }

        /* Goyangan Kue */
        @keyframes goyang {
            0%{transform: rotate(-4deg);} 
            50%{transform: rotate(4deg);} 
            100%{transform: rotate(-4deg);}
        }
        .kue {
            animation: goyang 3s ease-in-out infinite;
        }

        /* Tombol Musik */
        .tombol-musik {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            color: #0057B8;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(30,144,255,0.2);
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s;
        }
        .tombol-musik:hover {
            transform: scale(1.1);
        }
        .berputar {
            animation: putar 3s linear infinite;
        }
        @keyframes putar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="font-modern">

    <!-- Audio Suara -->
    <audio id="musikLatar" loop>
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-happy-birthday-tune-576.mp3" type="audio/mpeg">
    
    <audio id="suaraTombol">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-magical-coin-win-1936.mp3" type="audio/mpeg">
    

    <!-- Tombol Musik -->
    <div class="tombol-musik" id="tombolMusik">
        <i class="fa fa-music fa-lg"></i>
    </div>

    <!-- Hiasan Awan -->
    <div class="awan"></div>
    <div class="awan"></div>
    <div class="awan"></div>

    <!-- Hiasan Bintang -->
    <div class="bintang text-xl" style="top: 15%; left: 12%; animation-delay: 0.2s;">✦</div>
    <div class="bintang text-2xl" style="top: 20%; right: 15%; animation-delay: 0.6s;">✧</div>
    <div class="bintang text-lg" style="top: 60%; left: 8%; animation-delay: 1s;">✦</div>
    <div class="bintang text-xl" style="top: 65%; right: 10%; animation-delay: 1.4s;">✧</div>
    <div class="bintang text-lg" style="top: 35%; left: 5%; animation-delay: 1.8s;">✦</div>

    <!-- Balon Hiasan -->
    <div class="balon">🎈</div>
    <div class="balon">🎈</div>
    <div class="balon">🎈</div>
    <div class="balon">🎈</div>

    <div class="container mx-auto px-4 py-12 text-center relative z-10">

        <!-- Ikon Hiasan Atas -->
        <div class="text-biru-utama text-3xl mb-4 tracking-widest">✧ 𓍢 🤍 𓍢 ✧</div>

        <!-- Kue Ulang Tahun -->
        <div class="kue text-[130px] md:text-[190px] mb-6">🎂</div>

        <!-- Judul -->
        <h1 class="font-cantik text-[clamp(2.8rem,9vw,4.5rem)] text-biru-tua mb-3" style="text-shadow: 2px 4px 12px rgba(0, 87, 184, 0.15);">
            Selamat Ulang Tahun
        </h1>
        <h2 class="font-semibold text-[clamp(1.6rem,5vw,2.8rem)] text-biru-utama mb-10">
            <span class="text-biru-tua font-bold">Prakasa Rizqian Dinova</span> 🤍
        </h2>

        <!-- Kartu Ucapan -->
        <div class="kartu p-8 md:p-10 max-w-2xl mx-auto mb-12">
            <div class="relative z-10">
                <div class="text-biru-lembut text-2xl mb-4">❝</div>
                <p class="text-gray-700 text-lg md:text-xl leading-relaxed mb-4">
                    Semoga kebahagiaan selalu menyertaimu seperti langit biru yang cerah, dan kebaikan senantiasa menyelimuti hatimu seputih awan yang lembut.
                </p>
                <p class="text-gray-700 text-lg md:text-xl leading-relaxed mb-6">
                    Panjang umur, sehat walafiat, segala cita-cita tercapai, dan setiap harimu penuh dengan hal-hal indah. Bahagia selalu ya! ✨
                </p>
                <div class="text-biru-lembut text-2xl mb-6">❞</div>
                <p class="text-biru-tua font-semibold text-xl">
                    Dengan segenap kasih,<br>
                    <span class="font-bold text-biru-utama">Prakasa Rizqian Dinova</span> 🤍
                </p>
            </div>
        </div>

        <!-- Tombol Kejutan -->
        <button id="tombolKejutan" class="btn-kejutan text-white font-bold py-4 px-10 rounded-full text-xl">
            Klik Kejutan Spesial 🎁
        </button>

        <!-- Area Konfeti -->
        <div id="wadahKonfeti" class="relative h-36 mt-8"></div>

    </div>

    <script>
        const musik = document.getElementById('musikLatar');
        const suaraTombol = document.getElementById('suaraTombol');
        const tombolMusik = document.getElementById('tombolMusik');
        const tombolKejutan = document.getElementById('tombolKejutan');
        const wadah = document.getElementById('wadahKonfeti');
        const warna = ['#1E90FF', '#0057B8', '#87CEEB', '#ffffff', '#4169E1', '#B0E0E6'];

        let musikMenyala = false;

        // Putar musik saat halaman diklik pertama kali (aturan browser)
        document.addEventListener('click', function mulaiMusik() {
            if (!musikMenyala) {
                musik.volume = 0.4;
                musik.play();
                tombolMusik.classList.add('berputar');
                musikMenyala = true;
                document.removeEventListener('click', mulaiMusik);
            }
        });

        // Tombol on/off musik
        tombolMusik.addEventListener('click', () => {
            if (musik.paused) {
                musik.play();
                tombolMusik.classList.add('berputar');
                tombolMusik.innerHTML = '<i class="fa fa-music fa-lg"></i>';
            } else {
                musik.pause();
                tombolMusik.classList.remove('berputar');
                tombolMusik.innerHTML = '<i class="fa fa-volume-off fa-lg"></i>';
            }
        });

        // Efek tombol kejutan
        tombolKejutan.addEventListener('click', () => {
            suaraTombol.currentTime = 0;
            suaraTombol.volume = 0.6;
            suaraTombol.play();

            tombolKejutan.innerText = "Selamat Berbahagia! 🥰";
            tombolKejutan.classList.add('bg-biru-tua');

            // Buat konfeti
            for(let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const k = document.createElement('div');
                    k.classList.add('konfeti');
                    k.style.left = `${Math.random() * 100}%`;
                    k.style.backgroundColor = warna[Math.floor(Math.random() * warna.length)];
                    k.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    k.style.width = `${Math.random() * 10 + 6}px`;
                    k.style.height = k.style.width;
                    k.style.animationDelay = `${Math.random() * 0.8}s`;
                    wadah.appendChild(k);

                    setTimeout(() => k.remove(), 3500);
                }, i * 15);
            }
        });
    </script>
</body>
</html>
